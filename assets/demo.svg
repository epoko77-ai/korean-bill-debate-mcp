<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#112a47"/></linearGradient><linearGradient id="logo" x2="1" y2="1"><stop stop-color="#54dfb7"/><stop offset="1" stop-color="#4b82ff"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity=".35"/></filter></defs>
<rect width="1200" height="720" fill="url(#bg)"/><g font-family="Apple SD Gothic Neo,Noto Sans KR,sans-serif">
<rect x="34" y="28" width="40" height="40" rx="11" fill="url(#logo)"/><text x="54" y="56" text-anchor="middle" font-size="22" font-weight="800" fill="#061321">K</text><text x="88" y="48" font-size="19" font-weight="750" fill="#edf5ff">Korean Bill &amp; Debate MCP</text><text x="88" y="66" font-size="11" font-weight="650" fill="#6ddcbb">질문으로 찾고, 공식 기록으로 검증하다.</text>
<rect x="842" y="35" width="150" height="27" rx="14" fill="#10253a" stroke="#2b4b67"/><circle cx="859" cy="48" r="4" fill="#55dfb8"/><text x="870" y="53" font-size="12" fill="#bad0e5">열린국회 실시간 조회</text><rect x="1000" y="35" width="100" height="27" rx="14" fill="#10253a" stroke="#2b4b67"/><text x="1050" y="53" text-anchor="middle" font-size="12" fill="#bad0e5">입법 · 정책 · 연구</text><rect x="1108" y="35" width="56" height="27" rx="14" fill="#10253a" stroke="#2b4b67"/><text x="1136" y="53" text-anchor="middle" font-size="11" fill="#bad0e5">v1.0.0</text>
<rect x="34" y="89" width="1132" height="68" rx="15" fill="#0d1c2e" stroke="#39709a" filter="url(#shadow)"/><text x="57" y="131" font-size="19" fill="#f0f6ff">“검찰 보완수사권 폐지 논의의 현재 상태와 찬반 의견을 근거와 함께 보여줘”</text><text x="1128" y="131" text-anchor="end" font-size="14" font-weight="700" fill="#5ce0b8">✦ 질문 하나로 추적</text>
<g font-size="13" font-weight="650"><rect x="167" y="180" width="99" height="34" rx="9" fill="#12302f" stroke="#48d2ad"/><text x="216" y="202" text-anchor="middle" fill="#dffff5">법안·의안</text><text x="280" y="202" fill="#557794">→</text><rect x="300" y="180" width="99" height="34" rx="9" fill="#12302f" stroke="#48d2ad"/><text x="349" y="202" text-anchor="middle" fill="#dffff5">처리상태</text><text x="413" y="202" fill="#557794">→</text><rect x="433" y="180" width="120" height="34" rx="9" fill="#12302f" stroke="#48d2ad"/><text x="493" y="202" text-anchor="middle" fill="#dffff5">소위 회의록</text><text x="567" y="202" fill="#557794">→</text><rect x="587" y="180" width="99" height="34" rx="9" fill="#12302f" stroke="#48d2ad"/><text x="636" y="202" text-anchor="middle" fill="#dffff5">검토보고서</text><text x="700" y="202" fill="#557794">→</text><rect x="720" y="180" width="134" height="34" rx="9" fill="#12302f" stroke="#48d2ad"/><text x="787" y="202" text-anchor="middle" fill="#dffff5">의원·정부 발언</text></g>
<rect x="34" y="237" width="412" height="408" rx="15" fill="#0c1a2b" stroke="#294964"/><text x="56" y="267" font-size="12" font-weight="700" fill="#7693b1">발의부터 공개 논쟁까지 · 2026. 04 → 07</text><text x="56" y="302" font-size="20" font-weight="750" fill="#f0f6ff">개정안 3건, 쟁점은 하나</text><path d="M72 325v245" stroke="#315676" stroke-width="2"/><circle cx="72" cy="340" r="5" fill="#55dfb8"/><text x="91" y="336" font-size="11" fill="#7795b1">04.30 · 의안 2218740</text><text x="91" y="357" font-size="13" fill="#d8e6f3">박균택 의원 등 개정안 발의</text><circle cx="72" cy="400" r="5" fill="#55dfb8"/><text x="91" y="396" font-size="11" fill="#7795b1">05.15 · 의안 2218989</text><text x="91" y="417" font-size="13" fill="#d8e6f3">유상범 의원 등 별도 개정안 발의</text><circle cx="72" cy="460" r="5" fill="#55dfb8"/><text x="91" y="456" font-size="11" fill="#7795b1">06.26 · 의안 2219564</text><text x="91" y="477" font-size="13" fill="#d8e6f3">김용민·박은정 의원 개정안 발의</text><circle cx="72" cy="520" r="6" fill="#ffd05b"/><text x="91" y="516" font-size="11" fill="#7795b1">07.08 · 법제사법위원회</text><text x="91" y="537" font-size="13" fill="#d8e6f3">관련 법안·정부 입장 공개 논의</text><text x="91" y="558" font-size="11" fill="#81a3c1">김용민 · 조배숙 · 이성윤 · 정성호 · 심정희</text><text x="56" y="609" font-size="13" fill="#67baff">↗ 날짜별 의안·회의록 공식 원문</text>
<rect x="464" y="237" width="702" height="408" rx="15" fill="#0c1a2b" stroke="#294964"/><text x="486" y="267" font-size="12" font-weight="700" fill="#7693b1">찬반 발언 + 전문위원 검토 + 정부 답변</text>
<g><rect x="486" y="285" width="658" height="98" rx="12" fill="#0a1726" stroke="#24445f"/><circle cx="515" cy="316" r="18" fill="#193653"/><text x="515" y="322" text-anchor="middle" font-size="14" font-weight="800" fill="#70c9ff">김</text><text x="544" y="311" font-size="14" font-weight="750" fill="#edf5ff">김용민 의원</text><text x="544" y="334" font-size="14" fill="#cfdeed">“보완수사권 폐지는 정부의 최종적인 입장이 정리가 됐습니다.”</text><text x="544" y="361" font-size="11" fill="#50d8ad">✓ 원문 검증</text><text x="623" y="361" font-size="11" fill="#7894b0">질문 → 정부 답변</text></g>
<path d="M515 383v14" stroke="#4d718f" stroke-width="2"/><g><rect x="486" y="397" width="658" height="90" rx="12" fill="#0a1726" stroke="#24445f"/><circle cx="515" cy="428" r="18" fill="#26344f"/><text x="515" y="434" text-anchor="middle" font-size="14" font-weight="800" fill="#a8bbff">정</text><text x="544" y="423" font-size="14" font-weight="750" fill="#edf5ff">정성호 법무부 장관</text><text x="544" y="447" font-size="14" fill="#cfdeed">“예, 그렇습니다.”</text><text x="544" y="473" font-size="11" fill="#50d8ad">✓ 바로 다음 발언</text><text x="643" y="473" font-size="11" fill="#7894b0">정부 공식 입장 확인</text></g>
<path d="M515 487v14" stroke="#4d718f" stroke-width="2"/><g><rect x="486" y="501" width="658" height="118" rx="12" fill="#0a1726" stroke="#24445f"/><circle cx="515" cy="532" r="18" fill="#193653"/><text x="515" y="538" text-anchor="middle" font-size="14" font-weight="800" fill="#70c9ff">심</text><text x="544" y="527" font-size="14" font-weight="750" fill="#edf5ff">심정희 수석전문위원 · 검토보고서</text><text x="544" y="551" font-size="13" fill="#cfdeed">경찰 수사 통제, 피해자 구제와 수사협력 제도설계를 핵심 쟁점으로 검토</text><rect x="544" y="570" width="558" height="30" rx="5" fill="#0d2337"/><text x="556" y="590" font-size="12" fill="#50d8ad">✓ 공식 검토보고서</text><text x="684" y="590" font-size="12" fill="#8fa9c2">관련 의안 연결 · 원문 위치 보존</text></g>
<text x="36" y="681" font-size="13" font-weight="750" fill="#bcd1e5">지금 어디까지 · 왜 멈췄나 · 누가 말했나 · 무엇으로 확인하나</text><text x="1164" y="681" text-anchor="end" font-size="12" fill="#7894b0">상태 · 심사 쟁점 · 실제 발언 · 공식 원문</text>
</g></svg>
